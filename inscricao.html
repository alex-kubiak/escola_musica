        <h1>Formulário de Inscrição</h1>
        <form action="https://escola.ifrs.edu/cadastro.php " method="get">

 <label for="nome" >Nome completo:</label>
<br>
<input type="text" name="nom" id="nome" placeholder="Seu nome" required>
<br><br>
<label for="email" >Email:</label>
<br>
<input type="email" name="emai" id="email" placeholder="Seu Email" required>
<br><br>
<label for="nas">Data de nascimento:</label>
<br>
<input type="date" id="nas" name="nacimento" autofocus required>
<br><br>


 <label for="curso_desejado">Curso Desejado:</label><br>
      <select id="curso_desejado" name="curso_desejado" required>

        
        <option value="V">Violão</option>
        <option value="P">Piano</option>
        <option value="B">Bateria</option>
      </select>

<br><br>
<label for="horario">Horario Preferido:</label><br>

 <input type="radio" name="horario" id="manha" value="M" ><!--name igual permite selecionar somente uma caixinha///-->
<label for="manha">Manhã</label>

<input type="radio" name="horario" id="tarde" value="T"  >
<label for="tarde">Tarde</label>

<input type="radio" name="horario" id="noite" value="N"  >
<label for="noite">Noite</label>
<br><br>
<input type="submit" >
<input type="reset">



        </form>
